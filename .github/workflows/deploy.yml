name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OPENBRAIN_EC2_HOST }}
          username: ${{ secrets.OPENBRAIN_EC2_USERNAME }}
          key: ${{ secrets.OPENBRAIN_EC2_SSH_KEY }}
          script: |
            if [ ! -d ~/llm-skills ]; then
              git clone https://github.com/Luzgan/llm-skills.git ~/llm-skills
            else
              cd ~/llm-skills
              git pull origin main
            fi
