name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OPENBRAIN_EC2_HOST }}
          username: ${{ secrets.OPENBRAIN_EC2_USERNAME }}
          key: ${{ secrets.OPENBRAIN_EC2_SSH_KEY }}
          script: |
            if [ ! -d ~/llm-skills ]; then
              git clone https://github.com/Luzgan/llm-skills.git ~/llm-skills
            else
              cd ~/llm-skills
              git pull origin main
            fi
            ~/llm-skills/llm-skills install --global openbrain-memory
            ~/llm-skills/llm-skills install --global lifemanager-projects
            ~/llm-skills/llm-skills install --global workflow
            ~/llm-skills/llm-skills install --global git-gh
            ~/llm-skills/llm-skills install --global nightly-sync
            ~/llm-skills/llm-skills install --global morning-planner

            # Stop old screen-based services if they exist
            sudo systemctl stop nightly-sync morning-planner 2>/dev/null || true
            screen -S nightly-sync -X quit 2>/dev/null || true
            screen -S morning-planner -X quit 2>/dev/null || true

            # Set up systemd timers (oneshot services + timers)
            sudo cp ~/llm-skills/scripts/nightly-sync.service /etc/systemd/system/nightly-sync.service
            sudo cp ~/llm-skills/scripts/nightly-sync.timer /etc/systemd/system/nightly-sync.timer
            sudo cp ~/llm-skills/scripts/morning-planner.service /etc/systemd/system/morning-planner.service
            sudo cp ~/llm-skills/scripts/morning-planner.timer /etc/systemd/system/morning-planner.timer
            sudo systemctl daemon-reload
            sudo systemctl enable nightly-sync.timer morning-planner.timer
            sudo systemctl start nightly-sync.timer morning-planner.timer
